version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: foxnio-postgres
    environment:
      POSTGRES_USER: foxnio
      POSTGRES_PASSWORD: foxnio_secret
      POSTGRES_DB: foxnio
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foxnio"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - foxnio-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: foxnio-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - foxnio-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: foxnio-backend
    environment:
      - DATABASE_URL=postgres://foxnio:foxnio_secret@postgres:5432/foxnio
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - RUST_LOG=info
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - foxnio-network
    restart: unless-stopped

  # Frontend Web
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: foxnio-frontend
    ports:
      - "8080:3000"
    depends_on:
      - backend
    networks:
      - foxnio-network
    restart: unless-stopped

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: foxnio-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    networks:
      - foxnio-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  foxnio-network:
    driver: bridge
