services:
  postgres:
    image: postgres:16-alpine
    container_name: foxnio-postgres
    environment:
      POSTGRES_USER: foxnio
      POSTGRES_PASSWORD: foxnio_secret
      POSTGRES_DB: foxnio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foxnio"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - foxnio-network

  redis:
    image: redis:7-alpine
    container_name: foxnio-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - foxnio-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: foxnio-backend
    environment:
      DATABASE_URL: postgres://foxnio:foxnio_secret@postgres:5432/foxnio
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret-in-production}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-24}
      GATEWAY_API_KEY_PREFIX: ${GATEWAY_API_KEY_PREFIX:-sk-}
      FOXNIO_SERVER_HOST: 0.0.0.0
      FOXNIO_SERVER_PORT: 8080
      FOXNIO_MASTER_KEY: ${FOXNIO_MASTER_KEY:-}
      RUST_LOG: ${RUST_LOG:-info,foxnio=info}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - foxnio-network
    restart: unless-stopped

  frontend:
    profiles: ["ui"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    container_name: foxnio-frontend
    environment:
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "3001:3000"
    depends_on:
      backend:
        condition: service_started
    networks:
      - foxnio-network
    restart: unless-stopped

  nginx:
    profiles: ["edge"]
    image: nginx:alpine
    container_name: foxnio-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    networks:
      - foxnio-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  foxnio-network:
    driver: bridge
