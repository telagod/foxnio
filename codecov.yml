coverage:
  status:
    project:
      default:
        target: 85%
        threshold: 1%
        if_ci_failed: error
    patch:
      default:
        target: 85%
        threshold: 1%

flags:
  backend:
    paths:
      - backend/
    carryforward: true
  frontend:
    paths:
      - frontend/
    carryforward: true

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  require_changes: false

ignore:
  - "backend/migration/**"
  - "backend/tests/**"
  - "frontend/src/__tests__/**"
  - "**/*.test.ts"
  - "**/*.spec.ts"

github_checks:
  annotations: true
